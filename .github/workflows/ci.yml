name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: typecheck / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        env:
          SESSION_SECRET: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          DATABASE_URL: postgres://x:x@localhost:5432/x
        run: npx next build
